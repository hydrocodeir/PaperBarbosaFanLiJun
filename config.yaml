project:
  name: Quantile Regression + Bootstrap + Clustering for Temperature Extremes
  language: fa
  random_seed: 42
paths:
  data_csv: data/data.csv
  station_csv: data/stationsInfo.csv
  output_dir: outputs
data:
  station_id_col: station_id
  station_name_col: station_name
  year_col: year
  month_col: month
  day_col: day
  tmin_col: tmin
  tmax_col: tmax
  tmean_col: tmean
  precip_col: precip
index_construction:
  reference_years:
  - 1961
  - 1990
  percentile_window_days: 5
  lower_percentile: 10
  upper_percentile: 90
  drop_feb29: true
  min_reference_samples_per_doy: 15
  annual_min_valid_coverage_pct: 80.0
indices:
- name: warm_days
  source_col: tmax
  tail: upper
  percentile: 90
  title: Warm Days
  unit: days/year
- name: warm_nights
  source_col: tmin
  tail: upper
  percentile: 90
  title: Warm Nights
  unit: days/year
- name: cool_days
  source_col: tmax
  tail: lower
  percentile: 10
  title: Cool Days
  unit: days/year
- name: cool_nights
  source_col: tmin
  tail: lower
  percentile: 10
  title: Cool Nights
  unit: days/year
quantile_regression:
  full_quantiles:
    start: 0.05
    stop: 0.95
    step: 0.01
  focus_quantiles:
  - 0.05
  - 0.10
  - 0.50
  - 0.90
  - 0.95
  time_unit: decade
  min_years_required_to_run: 3
  min_years_recommended_for_publication: 20
  max_iter: 200
  sensitivity_check_quantiles:
  - 0.05
  - 0.95
bootstrap:
  enabled: true
  method: moving_block
  n_reps: 200
  block_length: auto
  block_length_rule: cube_root
  min_block_length: 2
  max_block_length: 8
  alpha: 0.05
  save_long_table: true
feature_engineering:
  delta_definitions:
    Delta1:
    - slope_0.95
    - slope_0.05
    Delta2:
    - slope_0.95
    - slope_0.50
    Delta3:
    - slope_0.50
    - slope_0.05
clustering:
  enabled: true
  algorithm: hierarchical
  linkage: average
  metric: euclidean
  n_clusters: 4
  standardize: true
  feature_mode: simple
  collinearity_screen:
    enabled: true
    abs_correlation_threshold: 0.95
  simple_features:
  - slope_0.05
  - slope_0.50
  - slope_0.95
  uncertainty_features:
  - slope_0.05
  - slope_0.50
  - slope_0.95
  - Delta1
  - boot_mean_0.05
  - boot_mean_0.50
  - boot_mean_0.95
  - boot_sd_0.05
  - boot_sd_0.50
  - boot_sd_0.95
  robustness_check:
    enabled: true
    reduced_features:
      - slope_0.05
      - slope_0.50
      - slope_0.95
      - Delta1
      - boot_mean_0.05
      - boot_mean_0.50
      - boot_mean_0.95
      - boot_sd_0.05
      - boot_sd_0.50
      - boot_sd_0.95
plots:
  dpi: 600
  style: default
  annotate_stations_on_map: false
  save_format: png
  heatmap_station_order: delta_desc
spatial_visualization:
  iran_boundary_geojson: data/Iran.geojson
  # options:
  # - thin_plate_spline (default)
  # - multiquadric
  # - inverse
  # - gaussian
  # - linear / cubic / nearest
  # - linear_rbf
  # - quintic
  interpolation_method: linear_rbf
  interpolation_smooth: 0.50
advanced_analyses:
  spatial_inference:
    enabled: true
    fdr_alpha: 0.05
    moran_permutations: 499
    moran_k_neighbors: 5
    quantiles:
    - 0.05
    - 0.10
    - 0.50
    - 0.90
    - 0.95
  method_sensitivity:
    enabled: true
    reference_periods:
      current:
      - 1961
      - 1990
      all_available: null
    bootstrap_methods:
    - moving_block
    - meboot
    interpolation_methods:
    - thin_plate_spline
    - linear_rbf
    - linear
  driver_analysis:
    enabled: true
    predictors:
    - latitude
    - longitude
    - elevation
    metrics:
    - slope_0.05
    - slope_0.50
    - slope_0.95
    - Delta1
  regionalization:
    enabled: true
    summary_metrics:
    - slope_0.05
    - slope_0.50
    - slope_0.95
    - Delta1
  bootstrap_depth_sensitivity:
    enabled: true
    n_reps: 400
  alternative_clustering_methods:
    enabled: true
    methods:
    - algorithm: hierarchical
      linkage: complete
      metric: euclidean
    - algorithm: hierarchical
      linkage: ward
      metric: euclidean
    - algorithm: hierarchical
      linkage: average
      metric: cityblock
    - algorithm: kmeans
